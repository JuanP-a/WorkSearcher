# WorkSearcher SSH hardening — drop-in for /etc/ssh/sshd_config.d/
# Loaded by sshd after main config. Final value wins.
#
# Apply via deploy/harden.sh.
# Revert: remove this file and `systemctl reload ssh`.

# Auth
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes

# Reduce attack surface
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# Forwarding (not used by this app)
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no
